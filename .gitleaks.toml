# Gitleaks configuration for Omni Code Go
# This file configures gitleaks to ignore false positives in documentation

title = "Omni Code Go Gitleaks Config"

[extend]
# Use the default gitleaks configuration as a base
useDefault = true

[[rules]]
# Allowlist for documentation examples and placeholders
id = "generic-api-key"
[rules.allowlist]
paths = [
    '''docs/''',
    '''README''',
    '''\.md$'''
]
regexes = [
    '''<YOUR_API_KEY_HERE>''',
    '''<YOUR_.*_HERE>''',
    '''xxx\.ngrok\.io''',
    '''example\.com''',
    '''placeholder'''
]
